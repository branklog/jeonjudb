<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전주 전화번호 DB</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; letter-spacing: -0.03em; }
        body { background-color: #0b0b0b; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 24px; }
        .main-wrapper { text-align: center; width: 100%; max-width: 420px; animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .symbol-icon { display: inline-block; width: 32px; height: 32px; margin-bottom: 24px; border: 2px solid #82F66F; border-radius: 50%; position: relative; }
        .symbol-icon::before { content: ''; position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border-left: 2px solid #82F66F; border-bottom: 2px solid #82F66F; transform: translate(-30%, -65%) rotate(-45deg); }
        h1 { font-size: 32px; font-weight: 700; line-height: 1.2; margin-bottom: 12px; }
        .subtitle { font-size: 15px; color: #888888; margin-bottom: 56px; line-height: 1.6; }
        .btn-enter { display: block; width: 100%; background-color: #82F66F; color: #000000; border: none; padding: 20px 0; font-size: 16px; font-weight: 700; border-radius: 20px; cursor: pointer; box-shadow: 0 8px 24px rgba(130, 246, 111, 0.15); transition: all 0.3s ease; }
        .btn-enter:hover { background-color: #9aff8c; transform: translateY(-2px); box-shadow: 0 12px 32px rgba(130, 246, 111, 0.3); }
        .footer { margin-top: 80px; font-size: 11px; color: #444444; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="symbol-icon"></div>
    <h1>전주 전화번호 DB</h1>
    <p class="subtitle">실시간 데이터 연동<br>전주 지역 데이터 아카이브</p>
    <button class="btn-enter" onclick="navigateToResult()">데이터베이스 조회하기</button>
    <div class="footer">© 2026 JEONJU DB ARCHIVE.</div>
</div>

<script>
    function navigateToResult() {
        const currentPath = window.location.pathname;
        if (currentPath.endsWith('/')) {
            window.location.href = currentPath + 'result.html';
        } else {
            const parts = currentPath.split('/');
            parts[parts.length - 1] = 'result.html';
            window.location.href = parts.join('/');
        }
    }
</script>
</body>
</html>
