<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전주 전화번호 DB</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            letter-spacing: -0.03em;
        }
        
        body {
            /* 깊고 매트한 블랙 배경 */
            background-color: #0b0b0b;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .main-wrapper {
            text-align: center;
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 📞 디자이너 감성의 미니멀 네온 그린 전화기 아이콘 (CSS 수작업 마감) */
        .phone-icon-wrapper {
            display: inline-block;
            width: 48px;
            height: 48px;
            margin-bottom: 24px;
            position: relative;
        }
        .phone-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            border: 2.5px solid #82F66F;
            border-radius: 6px;
            transform: translate(-50%, -50%) rotate(-35deg);
        }
        .phone-icon::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            width: 4px;
            height: 10px;
            border-left: 2.5px solid #82F66F;
            border-radius: 2px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .subtitle {
            font-size: 15px;
            color: #888888;
            margin-bottom: 56px;
            line-height: 1.6;
            font-weight: 400;
        }

        /* 크몽 무드의 네온 그린 배경 + 블랙 텍스트 버튼 */
        .btn-enter {
            display: block;
            width: 100%;
            background-color: #82F66F;
            color: #000000;
            border: none;
            padding: 20px 0;
            font-size: 16px;
            font-weight: 700;
            border-radius: 20px; /* 부드러운 라운드 코너 */
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(130, 246, 111, 0.15);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-enter:hover {
            background-color: #9aff8c;
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(130, 246, 111, 0.3);
        }

        .btn-enter:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 80px;
            font-size: 11px;
            color: #444444;
            font-weight: 400;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="phone-icon-wrapper">
        <div class="phone-icon"></div>
    </div>
    
    <h1>전주 전화번호 DB</h1>
    <p class="subtitle">실시간 데이터 연동<br>전주 지역 데이터 아카이브</p>
    
    <button class="btn-enter" onclick="navigateToResult()">데이터베이스 조회하기</button>
    
    <div class="footer">© 2026 JEONJU DB ARCHIVE.</div>
</div>

<script>
    function navigateToResult() {
        // 🛠️ [404 에러 완전 해결 우회 스크립트]
        // 현재 브라우저 주소창에서 파일명만 정확히 떼어내고 'result.html'을 붙여주는 브라우저 정석 연동 방식입니다.
        var href = window.location.href;
        var lastSlash = href.lastIndexOf('/');
        var basePath = href.substring(0, lastSlash + 1);
        
        // 무조건 동일 리포지토리 폴더 안의 result.html로 강제 매핑하여 이동시킵니다.
        window.location.href = basePath + "result.html";
    }
</script>
</body>
</html>
