<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전주 전화번호 DB</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            letter-spacing: -0.04em;
        }
        
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .main-wrapper {
            text-align: center;
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 20px 0;
        }

        h1 {
            font-size: 34px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 16px;
            color: #ffffff;
        }

        .subtitle {
            font-size: 15px;
            color: #888888;
            margin-bottom: 64px;
            line-height: 1.6;
            font-weight: 400;
        }

        /* 크몽 무드의 네온 그린 배경 + 블랙 텍스트 버튼 */
        .btn-enter {
            display: block;
            width: 100%;
            background-color: #82F66F;
            color: #000000;
            text-decoration: none;
            padding: 20px 0;
            font-size: 16px;
            font-weight: 700;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(130, 246, 111, 0.12);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center;
            cursor: pointer;
        }

        .btn-enter:hover {
            background-color: #9aff8c;
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(130, 246, 111, 0.25);
        }

        .footer {
            margin-top: 96px;
            font-size: 11px;
            color: #333333;
            font-weight: 400;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <h1>전주 전화번호 DB</h1>
    <p class="subtitle">실시간 데이터 연동<br>전주 지역 데이터 아카이브</p>
    
    <a href="https://branklog.github.io/jeonjudb/result.html" class="btn-enter">데이터베이스 조회하기</a>
    
    <div class="footer">© 2026 JEONJU DB ARCHIVE.</div>
</div>

</body>
</html>
