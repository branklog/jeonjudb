<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전주시 상권 데이터베이스</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; }
        body { background-color: #0b0b0b; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
        .container { width: 100%; max-width: 600px; text-align: center; }
        h1 { font-size: 32px; font-weight: 700; margin-bottom: 12px; color: #82F66F; }
        p.sub { color: #888888; font-size: 15px; margin-bottom: 40px; font-weight: 300; line-height: 1.5; }
        
        /* 2분할 미니멀 그리드 */
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        .region-card { 
            background: #121212; border: 1px solid #222222; padding: 40px 20px; border-radius: 16px; 
            text-align: center; cursor: pointer; transition: all 0.2s ease; text-decoration: none; color: #cccccc;
            display: flex; flex-direction: column; gap: 8px;
        }
        .region-card:hover { 
            border-color: #82F66F; color: #82F66F; transform: translateY(-4px); background: #161616;
            box-shadow: 0 8px 24px rgba(130, 246, 111, 0.15);
        }
        .region-title { font-size: 20px; font-weight: 700; }
        .region-tag { font-size: 12px; color: #555555; text-transform: uppercase; font-family: monospace; }
        .region-card:hover .region-tag { color: rgba(130, 246, 111, 0.6); }
    </style>
</head>
<body>

<div class="container">
    <h1>전주시 상권 DB 검색 시스템</h1>
    <p class="sub">공공데이터포털 원본을 기반으로 작동하는 전주시 전용 시스템입니다.<br>조회하시려는 자치구를 선택해 주세요.</p>

    <div class="grid-container">
        <a href="result.html?region=완산구" class="region-card"><span class="region-title">완산구</span><span class="region-tag">Wansan-gu</span></a>
        <a href="result.html?region=덕진구" class="region-card"><span class="region-title">덕진구</span><span class="region-tag">Deokjin-gu</span></a>
    </div>
</div>

</body>
</html>
