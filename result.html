<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전주시 상권 DB 검색 결과</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Pretendard', sans-serif;
}

body {
    background: #0b0b0b;
    color: #fff;
    padding: 40px 20px;
}

.container {
    max-width: 1100px;
    margin: 0 auto;
}

.header-area {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
    border-bottom: 1px solid #82F66F;
    padding-bottom: 20px;
}

h1 {
    font-size: 28px;
    font-weight: 700;
}

.target-region {
    color: #82F66F;
}

.counter {
    display: block;
    margin-top: 6px;
    color: #82F66F;
    font-size: 15px;
}

.btn-back {
    color: #888;
    text-decoration: none;
    font-size: 14px;
}

.btn-back:hover {
    color: #82F66F;
}

.search-box {
    margin-bottom: 20px;
}

.search-box input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid #222;
    background: #121212;
    color: #fff;
    font-size: 15px;
    outline: none;
}

.search-box input:focus {
    border-color: #82F66F;
}

.table-wrapper {
    background: #121212;
    border-radius: 16px;
    overflow-x: auto;
    padding: 12px;
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 800px;
}

th {
    background: #1a1a1a;
    color: #888;
    font-size: 13px;
    text-align: left;
    padding: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
}

td {
    padding: 16px;
    border-bottom: 1px solid #1f1f1f;
    color: #ccc;
    vertical-align: top;
}

tr:hover td {
    background: #1a1a1a;
    color: #fff;
}

.td-name {
    color: #82F66F;
    font-weight: 600;
}

.td-branch {
    color: #777;
}

.td-zip {
    color: #82F66F;
    font-family: monospace;
}

.empty-message {
    text-align: center;
    padding: 40px;
    color: #888;
}

/* 모바일 최적화 */
@media (max-width: 768px) {
    body {
        padding: 24px 12px;
    }

    h1 {
        font-size: 22px;
    }

    table {
        min-width: 700px;
    }

    /* 모바일에서 주소는 최대 2줄까지만 표시 */
    td:last-child {
        max-width: 180px;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        line-height: 1.5;
        word-break: break-word;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="header-area">
        <div>
            <h1>
                전주시 <span class="target-region" id="region-title"></span> 상권 DB
            </h1>
            <span class="counter" id="total-count">데이터 불러오는 중...</span>
        </div>
        <a href="index.html" class="btn-back">← 뒤로가기</a>
    </div>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="상호명을 입력하세요">
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>상호명</th>
                    <th>지점명</th>
                    <th>우편번호</th>
                    <th>도로명주소</th>
                </tr>
            </thead>
            <tbody id="result-table-body"></tbody>
        </table>
    </div>

</div>

<script>
let allData = [];
let filteredData = [];

window.onload = function () {
    const params = new URLSearchParams(window.location.search);
    const region = params.get('region') || '완산구';

    document.getElementById('region-title').textContent = region;

    loadData(region);

    document.getElementById('search-input').addEventListener('input', function () {
        const keyword = this.value.trim().toLowerCase();

        filteredData = allData.filter(item =>
            item.name.toLowerCase().includes(keyword)
        );

        renderTable(filteredData);
    });
};

async function loadData(region) {
    const tableBody = document.getElementById('result-table-body');
    const totalCountEl = document.getElementById('total-count');

    try {
        const response = await fetch('./data.json?v=' + Date.now());
        if (!response.ok) throw new Error('JSON 로드 실패');

        const rawData = await response.json();

        allData = rawData
            .filter(item =>
                (item["시군구명"] || '').includes(region) ||
                (item["도로명주소"] || '').includes(region)
            )
            .map(item => ({
                name: item["상호명"] || '',
                branch: item["지점명"] || '',
                zip: item["신우편번호"] || '',
                address: item["도로명주소"] || ''
            }))
            .sort((a, b) => a.name.localeCompare(b.name, 'ko'));

        filteredData = [...allData];

        totalCountEl.textContent =
            `총 ${allData.length.toLocaleString()}건 조회됨`;

        renderTable(filteredData);

    } catch (error) {
        console.error(error);
        totalCountEl.textContent = '데이터 로드 실패';
        tableBody.innerHTML = `
            <tr>
                <td colspan="4" class="empty-message">
                    data.json 파일을 확인해주세요.
                </td>
            </tr>
        `;
    }
}

function renderTable(data) {
    const tableBody = document.getElementById('result-table-body');
    const totalCountEl = document.getElementById('total-count');

    totalCountEl.textContent =
        `총 ${data.length.toLocaleString()}건 조회됨`;

    if (data.length === 0) {
        tableBody.innerHTML = `
            <tr>
                <td colspan="4" class="empty-message">
                    검색 결과가 없습니다.
                </td>
            </tr>
        `;
        return;
    }

    tableBody.innerHTML = '';

    const batchSize = 500;
    let index = 0;

    function renderBatch() {
        const fragment = document.createDocumentFragment();

        for (let i = 0; i < batchSize && index < data.length; i++, index++) {
            const item = data[index];
            const row = document.createElement('tr');

            row.innerHTML = `
                <td class="td-name">${escapeHtml(item.name)}</td>
                <td class="td-branch">${escapeHtml(item.branch || '-')}</td>
                <td class="td-zip">${escapeHtml(item.zip || '-')}</td>
                <td title="${escapeHtml(item.address)}">
                    ${escapeHtml(item.address)}
                </td>
            `;

            fragment.appendChild(row);
        }

        tableBody.appendChild(fragment);

        if (index < data.length) {
            requestAnimationFrame(renderBatch);
        }
    }

    renderBatch();
}

function escapeHtml(text) {
    return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}
</script>

</body>
</html>
