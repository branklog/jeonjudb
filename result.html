<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>전북 상권 DB 검색 결과</title>

<link
rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
/>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Pretendard',sans-serif;
}

body{
    background:#0b0b0b;
    color:#fff;
    padding:40px 16px;
}

.container{
    max-width:1200px;
    margin:0 auto;
}

.header-area{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:20px;
    border-bottom:1px solid #82F66F;
    padding-bottom:20px;
}

h1{
    font-size:28px;
    font-weight:700;
}

.target-region{
    color:#82F66F;
}

.counter{
    display:block;
    margin-top:6px;
    color:#82F66F;
    font-size:15px;
}

.btn-back{
    color:#888;
    text-decoration:none;
    font-size:14px;
}

.btn-back:hover{
    color:#82F66F;
}

.search-box{
    margin-bottom:20px;
}

.search-box input{
    width:100%;
    padding:14px 16px;
    border-radius:12px;
    border:1px solid #222;
    background:#121212;
    color:#fff;
    font-size:15px;
    outline:none;
}

.search-box input:focus{
    border-color:#82F66F;
}

.search-notice{

    margin-top:12px;

    display:flex;

    flex-direction:column;

    gap:6px;

    font-size:13px;

    color:#777;

    line-height:1.6;

    word-break:keep-all;

}

.search-notice span{

    display:flex;

    align-items:center;

    gap:6px;

}

.table-wrapper{
    background:#121212;
    border-radius:16px;
    overflow:auto;
    padding:12px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1a1a1a;
    color:#888;
    font-size:13px;
    text-align:left;
    padding:16px;
    position:sticky;
    top:0;
    z-index:5;
}

td{
    padding:16px;
    border-bottom:1px solid #1f1f1f;
    color:#ccc;
    vertical-align:top;
}

tr:hover td{
    background:#1a1a1a;
}

.td-name a{
    color:#82F66F;
    text-decoration:none;
    font-weight:600;
}

.td-name a:hover{
    text-decoration:underline;
}

.td-zip{
    color:#82F66F;
    font-family:monospace;
}

.address-cell{
    white-space:normal;
    line-height:1.6;
    word-break:break-word;
    cursor:pointer;
    transition:.2s;
}

.address-cell:hover{
    color:#82F66F;
}

.empty-message{
    text-align:center;
    padding:40px;
    color:#888;
}

@media (max-width:768px){

    body{
        padding:20px 10px;
    }

    h1{
        font-size:22px;
    }

    table{
        min-width:100%;
    }

    th{
        font-size:12px;
        padding:12px 8px;
    }

    td{
        font-size:13px;
        padding:12px 8px;
    }

    .address-cell{
        min-width:220px;
        line-height:1.5;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="header-area">

        <div>

            <h1>
                <span
                class="target-region"
                id="region-title">
                </span>

                상권 DB
            </h1>

            <span
            class="counter"
            id="total-count">

                데이터 불러오는 중...

            </span>

        </div>

        <a
        href="index.html"
        class="btn-back">

            ← 뒤로가기

        </a>

    </div>

    <div class="search-box">

        <input
        type="text"
        id="search-input"
        placeholder="상호명 또는 주소 검색"
        >

        <div class="search-notice">

            <span>
                📍 상호명을 누르면 네이버 플레이스로 이동합니다.
            </span>

            <span>
                📞 플레이스에서 전화번호 및 업체정보 확인이 가능합니다.
            </span>

            <span>
                📋 주소를 누르면 자동으로 복사됩니다.
            </span>

        </div>

    </div>

    <div class="table-wrapper">

        <table>

            <thead>

                <tr>

                    <th style="width:25%;">
                        상호명
                    </th>

                    <th style="width:15%;">
                        우편번호
                    </th>

                    <th style="width:60%;">
                        주소
                    </th>

                </tr>

            </thead>

            <tbody id="result-table-body"></tbody>

        </table>

    </div>

</div>

<script>

let allData = [];
let regionData = [];
let filteredData = [];

window.onload = function(){

    const params =
    new URLSearchParams(window.location.search);

    const region =
    params.get('region') || '완산구';

    document.getElementById('region-title')
    .textContent = region;

    loadData(region);

    document.getElementById('search-input')

    .addEventListener('keyup', function(){

        const keyword =
        this.value.trim().toLowerCase();

        if(keyword === ''){

            filteredData = [...regionData];

        }

        else{

            filteredData =
            regionData.filter(item => {

                const name =
                String(item.name || '')
                .toLowerCase();

                const address =
                String(item.address || '')
                .toLowerCase();

                return (

                    name.includes(keyword) ||

                    address.includes(keyword)

                );

            });

        }

        renderTable(filteredData);

    });

};

async function loadData(region){

    const tableBody =
    document.getElementById('result-table-body');

    const totalCountEl =
    document.getElementById('total-count');

    try{

        const response =
        await fetch('./data.json?v=' + Date.now());

        if(!response.ok){

            throw new Error('JSON 로드 실패');

        }

        const rawData =
        await response.json();

        allData =
        rawData.map(item => ({

            name :
            item["상호명"] || '',

            zip :
            item["신우편번호"] || '',

            address :
            item["도로명주소"] || '',

            city :
            item["시군구명"] || ''

        }));

        regionData =
        allData.filter(item => {

            return (

                item.city.includes(region) ||

                item.address.includes(region)

            );

        });

        filteredData = [...regionData];

        totalCountEl.textContent =
        `총 ${filteredData.length.toLocaleString()}건 조회됨`;

        renderTable(filteredData);

    }

    catch(error){

        console.error(error);

        totalCountEl.textContent =
        '데이터 로드 실패';

        tableBody.innerHTML = `

            <tr>

                <td
                colspan="3"
                class="empty-message">

                    data.json 파일을 확인해주세요.

                </td>

            </tr>

        `;

    }

}

function renderTable(data){

    const tableBody =
    document.getElementById('result-table-body');

    const totalCountEl =
    document.getElementById('total-count');

    totalCountEl.textContent =
    `총 ${data.length.toLocaleString()}건 조회됨`;

    if(data.length === 0){

        tableBody.innerHTML = `

            <tr>

                <td
                colspan="3"
                class="empty-message">

                    검색 결과가 없습니다.

                </td>

            </tr>

        `;

        return;

    }

    tableBody.innerHTML = '';

    const fragment =
    document.createDocumentFragment();

    data.forEach(item => {

        const row =
        document.createElement('tr');

        row.innerHTML = `

            <td class="td-name">

                <a
                href="https://map.naver.com/v5/search/${encodeURIComponent(item.name)}"
                target="_blank">

                    ${escapeHtml(item.name)}

                </a>

            </td>

            <td class="td-zip">

                ${escapeHtml(item.zip || '-')}

            </td>

            <td
            class="address-cell"
            data-address="${escapeHtml(item.address)}">

                ${escapeHtml(item.address)}

            </td>

        `;

        fragment.appendChild(row);

    });

    tableBody.appendChild(fragment);

    document.querySelectorAll('.address-cell')

    .forEach(cell => {

        cell.addEventListener('click', function(){

            const address =
            this.dataset.address;

            copyAddress(address);

        });

    });

}

function copyAddress(address){

    navigator.clipboard
    .writeText(address)

    .then(() => {

        alert('주소가 복사되었습니다.');

    })

    .catch(() => {

        alert('주소 복사 실패');

    });

}

function escapeHtml(text){

    return String(text)

    .replace(/&/g,'&amp;')

    .replace(/</g,'&lt;')

    .replace(/>/g,'&gt;')

    .replace(/"/g,'&quot;')

    .replace(/'/g,'&#039;');

}

</script>

</body>
</html>
