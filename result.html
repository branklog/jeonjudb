<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전북 종합 상권 DB - 결과</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; }
        body { background-color: #0b0b0b; color: #ffffff; padding: 60px 24px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; }
        .header-area { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1.5px solid #82F66F; }
        h1 { font-size: 26px; font-weight: 700; color: #ffffff; }
        .target-region { color: #82F66F; margin-right: 10px; }
        .counter { font-size: 16px; color: #82F66F; font-weight: 400; }
        .btn-back { font-size: 14px; color: #888888; text-decoration: none; border-bottom: 1px solid transparent; transition: all 0.2s ease; }
        .btn-back:hover { color: #82F66F; border-bottom: 1px solid #82F66F; }
        .table-wrapper { background: #121212; border-radius: 16px; padding: 12px; box-shadow: 0 4px 30px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; line-height: 1.5; }
        th { padding: 18px 16px; text-align: left; font-weight: 600; color: #888888; background-color: #1a1a1a; font-size: 13px; position: sticky; top: 0; }
        td { padding: 16px 16px; color: #cccccc; border-bottom: 1px solid #1f1f1f; }
        tr:hover td { background-color: #1a1a1a; color: #ffffff; }
        .td-name { font-weight: 600; color: #82F66F; }
        .td-branch { color: #777; font-size: 13px; }
        .td-zip { color: #82F66F; font-family: monospace; font-size: 15px; }
        #result-table-body { content-visibility: auto; contain-intrinsic-size: 1000px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h1><span class="target-region" id="region-title">지역</span>상권 DB <span class="counter" id="total-count">고속 데이터 매칭 중...</span></h1>
        <a href="index.html" class="btn-back">← 다시 선택하기</a>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 25%; border-radius: 8px 0 0 8px;">상호명</th>
                    <th style="width: 15%;">지점명</th>
                    <th style="width: 15%;">우편번호</th>
                    <th style="width: 45%; border-radius: 0 8px 8px 0;">상세 주소</th>
                </tr>
            </thead>
            <tbody id="result-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    // 🗜️ 원본 텍스트 파일 데이터 세트를 고밀도 문자열 묶음으로 임베딩했습니다.
    const embeddedRawText = "상호명\t지점명\t시군구명\t도로명주소\t신우편번호\n오스포츠샵\t\t군산시\t전북특별자치도 군산시 옥서면 신장원길 15\t54170\n렛츠코딩앤플레이\t\t완주군\t전북특별자치도 완주군 이서면 출판로 46-5\t55365\n성일리츠\t\t익산시\t전북특별자치도 익산시 무왕로 1062\t54637\n쌍용타이어\t\t부안군\t전북특별자치도 부안군 행안면 행안중앙로 8\t56319\n법인버섯천지\t\t부안군\t전북특별자치도 부안군 보안면 부안로 1182-12\t56329\n노는언니\t\t부안군\t전북특별자치도 부안군 부안읍 시장길 29\t56308\n스카이유통클린\t\t김제시\t전북특별자치도 김제시 동서로 153\t54390\n이모네화훼.묘목농장\t\t익산시\t전북특별자치도 익산시 금마면 미륵사지로 51\t54573\n썸\t\t완주군\t전북특별자치도 완주군 상관면 왜목로 726-8\t55359\n디디네일\t\t부안군\t전북특별자치도 부안군 부안읍 부풍로 43-1\t56308\n현아가맥\t\t전주시 완산구\t전북특별자치도 전주시 완산구 서신천변13길 4-6\t54951\n초원식당\t\t익산시\t전북특별자치도 익산시 인북로11길 7\t54619\n진명모터스\t\t익산시\t전북특별자치도 익산시 익산대로 341\t54651\n수영이네반찬\t\t익산시\t전북특별자치도 익산시 인북로 259\t54619\n마음톡 심리상담센터\t\t익산시\t전북특별자치도 익산시 선화로17길 28\t54656\n카페사밀\t\t군산시\t전북특별자치도 군산시 구암31로 30\t54038\n정심\t\t장수군\t전북특별자치도 장수군 장계면 한들로 79\t55612\n오토크루(autocrew)\t\t전주시 덕진구\t전북특별자치도 전주시 덕진구 용정길 21\t54857\n부안마케팅영농조합법인\t\t부안군\t전북특별자치도 부안군 동진면 순환남로 802\t56317\n김수연원목공방 (gallery)\t\t군산시\t전북특별자치도 군산시 팔마로 97-1\t54121";

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const selectedRegion = urlParams.get('region') || "전주시";
        document.getElementById('region-title').textContent = selectedRegion + " ";

        renderEmbeddedData(selectedRegion);
    }

    function renderEmbeddedData(region) {
        const tableBody = document.getElementById('result-table-body');
        const totalCountEl = document.getElementById('total-count');

        try {
            const lines = embeddedRawText.split('\n');
            const filteredData = [];

            // 실시간 인메모리 필터 처리
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                const columns = line.split('\t');
                if (columns.length < 4) continue;

                const currentCity = columns[2] ? columns[2].trim() : "";
                const currentAddr = columns[3] ? columns[3].trim() : "";

                if (currentCity.includes(region) || currentAddr.includes(region)) {
                    filteredData.push({
                        name: columns[0] ? columns[0].trim() : "",
                        branch: columns[1] ? columns[1].trim() : "",
                        address: currentAddr,
                        zip: columns[4] ? columns[4].trim() : ""
                    });
                }
            }

            // 가나다순 정렬
            filteredData.sort((a, b) => a.name.localeCompare(b.name));
            totalCountEl.textContent = `총 ${filteredData.length.toLocaleString()}건 데이터 실시간 로드 완료`;
            
            const fragment = document.createDocumentFragment();
            filteredData.forEach(item => {
                if(item.name) {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="td-name">${item.name}</td>
                        <td class="td-branch">${item.branch || "-"}</td>
                        <td class="td-zip">${item.zip || "-"}</td>
                        <td>${item.address}</td>
                    `;
                    fragment.appendChild(row);
                }
            });
            
            tableBody.innerHTML = ''; 
            tableBody.appendChild(fragment);

        } catch (error) {
            console.error(error);
            totalCountEl.textContent = "빌드 실패";
            tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:40px; color:#ff6b6b;">⚠️ 데이터 가공 중 에러가 발생했습니다.</td></tr>`;
        }
    }
</script>
</body>
</html>
