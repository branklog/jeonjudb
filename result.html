<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전주시 종합 상권 DB - 결과</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; }
        body { background-color: #0b0b0b; color: #ffffff; padding: 60px 24px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; }
        .header-area { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1.5px solid #82F66F; }
        h1 { font-size: 26px; font-weight: 700; color: #ffffff; }
        .target-region { color: #82F66F; margin-right: 10px; }
        .counter { font-size: 16px; color: #82F66F; font-weight: 400; }
        .btn-back { font-size: 14px; color: #888888; text-decoration: none; border-bottom: 1px solid transparent; transition: all 0.2s ease; }
        .btn-back:hover { color: #82F66F; border-bottom: 1px solid #82F66F; }
        
        .table-wrapper { background: #121212; border-radius: 16px; padding: 12px; box-shadow: 0 4px 30px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; line-height: 1.5; }
        th { padding: 18px 16px; text-align: left; font-weight: 600; color: #888888; background-color: #1a1a1a; font-size: 13px; position: sticky; top: 0; }
        td { padding: 16px 16px; color: #cccccc; border-bottom: 1px solid #1f1f1f; }
        tr:hover td { background-color: #1a1a1a; color: #ffffff; }
        .td-name { font-weight: 600; color: #82F66F; }
        .td-branch { color: #777; font-size: 13px; }
        .td-zip { color: #82F66F; font-family: monospace; font-size: 15px; }
        #result-table-body { content-visibility: auto; contain-intrinsic-size: 1000px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h1>전주시 <span class="target-region" id="region-title">구</span>상권 DB <span class="counter" id="total-count">스캔 중...</span></h1>
        <a href="index.html" class="btn-back">← 뒤로가기</a>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 30%; border-radius: 8px 0 0 8px;">상호명</th>
                    <th style="width: 15%;">지점명</th>
                    <th style="width: 15%;">우편번호</th>
                    <th style="width: 40%; border-radius: 0 8px 8px 0;">상세 주소</th>
                </tr>
            </thead>
            <tbody id="result-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const selectedRegion = urlParams.get('region') || "완산구";
        document.getElementById('region-title').textContent = selectedRegion + " ";

        loadJeonjuDistrictData(selectedRegion);
    }

    async function loadJeonjuDistrictData(district) {
        const tableBody = document.getElementById('result-table-body');
        const totalCountEl = document.getElementById('total-count');

        try {
            // 8메가 원본 파일 직접 호출
            const response = await fetch('./소상공인시장진흥공단_상가(상권)정보_전북_202603.txt');
            if (!response.ok) throw new Error("파일 로드 실패");
            
            const arrayBuffer = await response.arrayBuffer();
            const decoder = new TextDecoder('euc-kr');
            const rawText = decoder.decode(arrayBuffer);

            const lines = rawText.split(/\r?\n/);
            const filteredData = [];

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                const columns = line.split('\t');
                if (columns.length < 4) continue;

                const currentCity = columns[2] ? columns[2].trim() : ""; // 시군구명 열
                
                // 🛑 시군구명 열에 '완산구' 또는 '덕진구'가 정확히 일치하는 진짜 데이터만 추출
                if (currentCity.includes(district)) {
                    filteredData.push({
                        name: columns[0] ? columns[0].trim() : "",
                        branch: columns[1] ? columns[1].trim() : "",
                        address: columns[3] ? columns[3].trim() : "",
                        zip: columns[4] ? columns[4].trim() : ""
                    });
                }
            }

            // 가나다순 오름차순 정렬
            filteredData.sort((a, b) => a.name.localeCompare(b.name));
            totalCountEl.textContent = `총 ${filteredData.length.toLocaleString()}건 추출 완료`;
            
            const fragment = document.createDocumentFragment();
            filteredData.forEach(item => {
                if(item.name) {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="td-name">${item.name}</td>
                        <td class="td-branch">${item.branch || "-"}</td>
                        <td class="td-zip">${item.zip || "-"}</td>
                        <td>${item.address}</td>
                    `;
                    fragment.appendChild(row);
                }
            });
            
            tableBody.innerHTML = ''; 
            tableBody.appendChild(fragment);

        } catch (error) {
            console.error(error);
            totalCountEl.textContent = "연동 실패";
            tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:40px; color:#ff6b6b;">⚠️ 데이터 연동에 실패했습니다. 원본 텍스트 파일이 HTML 파일들과 같은 경로에 업로드되어 있는지 확인해 주세요.</td></tr>`;
        }
    }
</script>
</body>
</html>
